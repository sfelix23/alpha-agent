name: Daily Analyst + Trader

on:
  schedule:
    # 10:35 ART = 13:35 UTC (lunes a viernes)
    - cron: '35 13 * * 1-5'
  workflow_dispatch:   # permite correrlo manualmente desde GitHub

jobs:
  analyst:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_DT_API_KEY=${{ secrets.ALPACA_DT_API_KEY }}
          ALPACA_DT_SECRET_KEY=${{ secrets.ALPACA_DT_SECRET_KEY }}
          TWILIO_SID=${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN=${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM=${{ secrets.TWILIO_FROM }}
          TWILIO_TO=${{ secrets.TWILIO_TO }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          EOF

      - name: Run Analyst
        run: python run_analyst.py --send

      - name: Run Trader
        run: python run_trader.py --live

      - name: Generate Dashboard
        run: python run_dashboard.py --no-open

      - name: Commit DB + Dashboard
        run: |
          git config user.name  "alpha-bot"
          git config user.email "alpha-bot@users.noreply.github.com"
          git add docs/index.html alpha_agent/analytics/trade_db.sqlite signals/ || true
          git diff --staged --quiet || git commit -m "chore: daily analyst $(date -u +%Y-%m-%d)"
          git push
