name: "Alpha Daily"
# Corre analyst + trader LP/CP + day trader cada mañana.
# También se puede disparar manualmente con el botón "Run workflow".

on:
  schedule:
    # 13:40 UTC = 10:40 ART (lunes a viernes)
    - cron: "40 13 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar aunque ya corrió hoy (true/false)"
        default: "false"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env <<EOF
          ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_DT_API_KEY=${{ secrets.ALPACA_DT_API_KEY }}
          ALPACA_DT_SECRET_KEY=${{ secrets.ALPACA_DT_SECRET_KEY }}
          TWILIO_SID=${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN=${{ secrets.TWILIO_TOKEN }}
          MY_PHONE_NUMBER=${{ secrets.MY_PHONE_NUMBER }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          EOF

      - name: Validate secrets
        run: |
          python - <<'PYEOF'
          import os, sys
          from dotenv import load_dotenv
          load_dotenv()
          missing = [k for k in ["ALPACA_API_KEY","ALPACA_SECRET_KEY","ANTHROPIC_API_KEY","TWILIO_SID","TWILIO_TOKEN","MY_PHONE_NUMBER"]
                     if not os.getenv(k)]
          if missing:
              print(f"ERROR: Secrets faltantes en GitHub → Settings → Secrets → Actions: {missing}")
              print("Agrega los secrets y vuelve a correr el workflow.")
              sys.exit(1)
          print("Secrets OK:", [k for k in ["ALPACA_API_KEY","ALPACA_DT_API_KEY","ANTHROPIC_API_KEY","TWILIO_SID"] if os.getenv(k)])
          PYEOF

      - name: Get equity LP/CP
        id: equity
        run: |
          EQUITY=$(python -c "
          from dotenv import load_dotenv; load_dotenv()
          from trader_agent.brokers.alpaca_broker import AlpacaBroker
          try:
              b = AlpacaBroker(paper=True)
              print(f'{b.get_equity():.2f}')
          except Exception:
              print('1600.00')
          " 2>/dev/null || echo "1600.00")
          echo "capital=$EQUITY" >> $GITHUB_OUTPUT
          echo "Equity LP/CP: $EQUITY"

      - name: Run Analyst (genera señales LP/CP)
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE_FLAG="--force"; fi
          python run_analyst.py --send --capital ${{ steps.equity.outputs.capital }} $FORCE_FLAG

      - name: Run Trader LP/CP
        run: python run_trader.py --live --capital ${{ steps.equity.outputs.capital }}

      - name: Run Day Trader
        run: python run_daytrader.py --live
        continue-on-error: true   # no rompe el pipeline si el mercado ya cerró

      - name: Generate Dashboard
        run: python run_dashboard.py --no-open

      - name: Commit signals y dashboard
        run: |
          git config user.name  "alpha-bot"
          git config user.email "alpha-bot@users.noreply.github.com"
          git pull --rebase origin master || true
          git add signals/latest.json signals/trades.db signals/capital_baseline.json \
                  signals/performance_log.json docs/index.html || true
          git diff --staged --quiet || git commit -m "chore: daily run $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
          git push
        continue-on-error: true
