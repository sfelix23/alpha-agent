name: "Alpha Daily"
# Analyst + Trader LP/CP + Day Trader cada mañana.
# Disparo manual: Actions → Alpha Daily → Run workflow.

on:
  schedule:
    - cron: "40 13 * * 1-5"   # 10:40 ART (UTC-3), lun-vie
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar aunque ya corrió hoy"
        default: "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --prefer-binary -r requirements.txt

      - name: Create .env
        run: |
          printf 'ALPACA_API_KEY=%s\n'        "${{ secrets.ALPACA_API_KEY }}"        >  .env
          printf 'ALPACA_SECRET_KEY=%s\n'     "${{ secrets.ALPACA_SECRET_KEY }}"     >> .env
          printf 'ALPACA_DT_API_KEY=%s\n'     "${{ secrets.ALPACA_DT_API_KEY }}"     >> .env
          printf 'ALPACA_DT_SECRET_KEY=%s\n'  "${{ secrets.ALPACA_DT_SECRET_KEY }}"  >> .env
          printf 'TWILIO_SID=%s\n'            "${{ secrets.TWILIO_SID }}"            >> .env
          printf 'TWILIO_TOKEN=%s\n'          "${{ secrets.TWILIO_TOKEN }}"          >> .env
          printf 'MY_PHONE_NUMBER=%s\n'       "${{ secrets.MY_PHONE_NUMBER }}"       >> .env
          printf 'ANTHROPIC_API_KEY=%s\n'     "${{ secrets.ANTHROPIC_API_KEY }}"     >> .env
          printf 'GOOGLE_API_KEY=%s\n'        "${{ secrets.GOOGLE_API_KEY }}"        >> .env
          echo ".env creado OK"

      - name: Validate secrets
        run: |
          python -c '
          import os, sys
          from dotenv import load_dotenv
          load_dotenv()
          need = ["ALPACA_API_KEY","ALPACA_SECRET_KEY","ANTHROPIC_API_KEY","TWILIO_SID","TWILIO_TOKEN","MY_PHONE_NUMBER"]
          missing = [k for k in need if not os.getenv(k)]
          if missing:
              sys.exit("Secrets faltantes en GitHub Settings->Secrets->Actions: " + str(missing))
          print("Secrets OK:", {k: os.getenv(k)[:4]+"..." for k in need})
          '

      - name: Get equity LP/CP
        id: equity
        run: |
          EQUITY=$(python -c '
          from dotenv import load_dotenv; load_dotenv()
          from trader_agent.brokers.alpaca_broker import AlpacaBroker
          try:
              b = AlpacaBroker(paper=True)
              print(f"{b.get_equity():.2f}")
          except Exception as e:
              print("1600.00")
          ' 2>/dev/null || echo "1600.00")
          echo "capital=$EQUITY" >> $GITHUB_OUTPUT
          echo "Equity LP/CP: $EQUITY"

      - name: Run Analyst
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force }}" = "true" ] && FORCE="--force"
          python run_analyst.py --send --capital ${{ steps.equity.outputs.capital }} $FORCE

      - name: Run Trader LP/CP
        run: python run_trader.py --live --capital ${{ steps.equity.outputs.capital }}

      - name: Run Day Trader
        run: python run_daytrader.py --live
        continue-on-error: true

      - name: Generate Dashboard
        run: python run_dashboard.py --no-open

      - name: Commit resultados
        run: |
          git config user.name  "alpha-bot"
          git config user.email "alpha-bot@users.noreply.github.com"
          git pull --rebase origin master || true
          git add signals/latest.json signals/trades.db signals/capital_baseline.json \
                  signals/performance_log.json docs/index.html || true
          git diff --staged --quiet || git commit -m "chore: daily $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
          git push
        continue-on-error: true

      - name: Escribir estado del workflow
        if: always()
        run: |
          python -c '
          import json, sys
          from pathlib import Path
          from datetime import datetime, timezone
          f = Path("signals/workflow_status.json")
          data = json.loads(f.read_text()) if f.exists() else {}
          data["alpha_daily"] = {"ts": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M"), "ok": sys.argv[1] == "true"}
          f.write_text(json.dumps(data, indent=2))
          ' "${{ job.status == 'success' }}"
          git config user.name "alpha-bot" 2>/dev/null || true
          git config user.email "alpha-bot@users.noreply.github.com" 2>/dev/null || true
          git add signals/workflow_status.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: workflow status [skip ci]" 2>/dev/null || true
          git push 2>/dev/null || true
        continue-on-error: true

      - name: WhatsApp - notificar fallo
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_SID }}/Messages.json" \
            -u "${{ secrets.TWILIO_SID }}:${{ secrets.TWILIO_TOKEN }}" \
            --data-urlencode "From=whatsapp:+14155238886" \
            --data-urlencode "To=whatsapp:${{ secrets.MY_PHONE_NUMBER }}" \
            --data-urlencode "Body=ALPHA DAILY FALLO en GitHub Actions. Ver: https://github.com/sfelix23/alpha-agent/actions"
