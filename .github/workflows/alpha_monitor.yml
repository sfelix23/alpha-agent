name: "Alpha Monitor"
# Vigila stops/TPs cada 30 min durante horario de mercado.

on:
  schedule:
    - cron: "5,35 14-19 * * 1-5"   # 11:05-16:35 ART, lun-vie
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --prefer-binary -r requirements.txt

      - name: Create .env
        run: |
          printf 'ALPACA_API_KEY=%s\n'        "${{ secrets.ALPACA_API_KEY }}"        >  .env
          printf 'ALPACA_SECRET_KEY=%s\n'     "${{ secrets.ALPACA_SECRET_KEY }}"     >> .env
          printf 'ALPACA_DT_API_KEY=%s\n'     "${{ secrets.ALPACA_DT_API_KEY }}"     >> .env
          printf 'ALPACA_DT_SECRET_KEY=%s\n'  "${{ secrets.ALPACA_DT_SECRET_KEY }}"  >> .env
          printf 'TWILIO_SID=%s\n'            "${{ secrets.TWILIO_SID }}"            >> .env
          printf 'TWILIO_TOKEN=%s\n'          "${{ secrets.TWILIO_TOKEN }}"          >> .env
          printf 'MY_PHONE_NUMBER=%s\n'       "${{ secrets.MY_PHONE_NUMBER }}"       >> .env
          printf 'ANTHROPIC_API_KEY=%s\n'     "${{ secrets.ANTHROPIC_API_KEY }}"     >> .env
          echo ".env creado OK"

      - name: Validate secrets
        run: |
          python -c '
          import os, sys
          from dotenv import load_dotenv
          load_dotenv()
          if not os.getenv("ALPACA_API_KEY"):
              sys.exit("ALPACA_API_KEY faltante. Agregar en GitHub Settings->Secrets->Actions")
          print("Secrets OK, ALPACA_API_KEY:", os.getenv("ALPACA_API_KEY")[:4]+"...")
          '

      - name: Run Monitor
        run: python run_monitor.py --live

      - name: Generate Dashboard
        run: python run_dashboard.py --no-open

      - name: Commit si hubo cambios
        run: |
          git config user.name  "alpha-bot"
          git config user.email "alpha-bot@users.noreply.github.com"
          git pull --rebase origin master || true
          git add signals/trades.db docs/index.html || true
          git diff --staged --quiet || git commit -m "chore: monitor $(date -u +%H:%M) [skip ci]"
          git push
        continue-on-error: true

      - name: Escribir estado del workflow
        if: always()
        run: |
          python -c '
          import json, sys
          from pathlib import Path
          from datetime import datetime, timezone
          f = Path("signals/workflow_status.json")
          data = json.loads(f.read_text()) if f.exists() else {}
          data["alpha_monitor"] = {"ts": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M"), "ok": sys.argv[1] == "true"}
          f.write_text(json.dumps(data, indent=2))
          ' "${{ job.status == 'success' }}"
          git config user.name "alpha-bot" 2>/dev/null || true
          git config user.email "alpha-bot@users.noreply.github.com" 2>/dev/null || true
          git add signals/workflow_status.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: workflow status [skip ci]" 2>/dev/null || true
          git push 2>/dev/null || true
        continue-on-error: true

      - name: WhatsApp - notificar fallo critico
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_SID }}/Messages.json" \
            -u "${{ secrets.TWILIO_SID }}:${{ secrets.TWILIO_TOKEN }}" \
            --data-urlencode "From=whatsapp:+14155238886" \
            --data-urlencode "To=whatsapp:${{ secrets.MY_PHONE_NUMBER }}" \
            --data-urlencode "Body=ALPHA MONITOR FALLO. Posiciones sin vigilancia. Ver: https://github.com/sfelix23/alpha-agent/actions"
