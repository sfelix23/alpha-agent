name: "Alpha Analyst + Trade"

on:
  schedule:
    # 13:35 UTC = 10:35 ART (UTC-3). Lunes a viernes.
    - cron: "35 13 * * 1-5"
  workflow_dispatch:
    inputs:
      send_whatsapp:
        description: "Enviar WhatsApp (true/false)"
        default: "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write   # necesario para commitear signals/latest.json

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache yfinance data (reutilizar dentro del mismo día)
        uses: actions/cache@v4
        with:
          path: alpha_agent/data/cache
          key: yf-cache-${{ github.run_id }}
          restore-keys: yf-cache-

      - name: Create .env from secrets
        run: |
          cat > .env <<EOF
          ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
          TWILIO_SID=${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN=${{ secrets.TWILIO_TOKEN }}
          MY_PHONE_NUMBER=${{ secrets.MY_PHONE_NUMBER }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF

      - name: Get Alpaca equity (capital dinámico)
        id: equity
        run: |
          EQUITY=$(python -c "
          from dotenv import load_dotenv; load_dotenv()
          from trader_agent.brokers.alpaca_broker import AlpacaBroker
          try:
              b = AlpacaBroker(paper=True)
              print(f'{b.get_equity():.2f}')
          except Exception as e:
              print('1600.00')
          " 2>/dev/null)
          echo "capital=$EQUITY" >> $GITHUB_OUTPUT
          echo "Equity: $EQUITY"

      - name: Run Analyst
        run: |
          python run_analyst.py --send --capital ${{ steps.equity.outputs.capital }}

      - name: Run Trader
        run: |
          python run_trader.py --live --notify --capital ${{ steps.equity.outputs.capital }}

      - name: Commit signals to repo
        run: |
          git config user.name "Alpha Bot"
          git config user.email "alpha-bot@noreply.github.com"
          git add signals/latest.json
          git diff --staged --quiet || git commit -m "chore: signals update $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
          git push
        continue-on-error: true   # no romper el pipeline si no hay cambios
