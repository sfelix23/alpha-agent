name: Day Trader

on:
  schedule:
    # 11:30 ART = 14:30 UTC (60 min post NYSE open, ORB window)
    - cron: '30 14 * * 1-5'
  workflow_dispatch:

jobs:
  daytrader:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_DT_API_KEY=${{ secrets.ALPACA_DT_API_KEY }}
          ALPACA_DT_SECRET_KEY=${{ secrets.ALPACA_DT_SECRET_KEY }}
          TWILIO_SID=${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN=${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM=${{ secrets.TWILIO_FROM }}
          TWILIO_TO=${{ secrets.TWILIO_TO }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          EOF

      - name: Run DayTrader
        run: python run_daytrader.py --live

      - name: Commit DB if changed
        run: |
          git config user.name  "alpha-bot"
          git config user.email "alpha-bot@users.noreply.github.com"
          git pull --rebase origin master
          git add alpha_agent/analytics/trade_db.sqlite || true
          git diff --staged --quiet || git commit -m "chore: daytrader $(date -u +%Y-%m-%d)"
          git push
