name: "Alpha Weekly"
# Rebalancer semanal — viernes antes del cierre.

on:
  schedule:
    - cron: "0 18 * * 5"   # Viernes 15:00 ART
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --prefer-binary -r requirements.txt

      - name: Create .env
        run: |
          printf 'ALPACA_API_KEY=%s\n'    "${{ secrets.ALPACA_API_KEY }}"    >  .env
          printf 'ALPACA_SECRET_KEY=%s\n' "${{ secrets.ALPACA_SECRET_KEY }}" >> .env
          printf 'TWILIO_SID=%s\n'        "${{ secrets.TWILIO_SID }}"        >> .env
          printf 'TWILIO_TOKEN=%s\n'      "${{ secrets.TWILIO_TOKEN }}"      >> .env
          printf 'MY_PHONE_NUMBER=%s\n'   "${{ secrets.MY_PHONE_NUMBER }}"   >> .env
          printf 'ANTHROPIC_API_KEY=%s\n' "${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo ".env creado OK"

      - name: Validate secrets
        run: |
          python -c '
          import os, sys
          from dotenv import load_dotenv
          load_dotenv()
          if not os.getenv("ALPACA_API_KEY"):
              sys.exit("ALPACA_API_KEY faltante.")
          print("Secrets OK")
          '

      - name: Run Rebalancer
        run: python run_rebalancer.py --live

      - name: Generate Dashboard
        run: python run_dashboard.py --no-open

      - name: Commit
        run: |
          git config user.name  "alpha-bot"
          git config user.email "alpha-bot@users.noreply.github.com"
          git pull --rebase origin master || true
          git add signals/ docs/index.html || true
          git diff --staged --quiet || git commit -m "chore: weekly rebalance $(date -u +%Y-%m-%d) [skip ci]"
          git push
        continue-on-error: true

      - name: WhatsApp - notificar fallo
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_SID }}/Messages.json" \
            -u "${{ secrets.TWILIO_SID }}:${{ secrets.TWILIO_TOKEN }}" \
            --data-urlencode "From=whatsapp:+14155238886" \
            --data-urlencode "To=whatsapp:${{ secrets.MY_PHONE_NUMBER }}" \
            --data-urlencode "Body=ALPHA WEEKLY FALLO. Rebalancer no ejecutado. Ver: https://github.com/sfelix23/alpha-agent/actions"
